
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{padding:1rem 0}
.tabs{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.tab-btn{padding:6px 16px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);cursor:pointer;transition:all .15s}
.tab-btn.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500;border-color:var(--color-border-primary)}
.metric-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:1.5rem}
.metric-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.mc-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.mc-ch{font-size:12px;font-weight:500;margin-bottom:2px}
.mc-val{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.mc-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.mc-trend{font-size:11px;margin-top:2px}
.up{color:#1d9e75}.dn{color:#d85a30}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;font-size:12px;color:var(--color-text-secondary)}
.legend span{display:flex;align-items:center;gap:4px}
.lbox{width:10px;height:10px;border-radius:2px;display:inline-block}
.chart-wrap{position:relative;width:100%;height:280px}
.chart-wrap-lg{position:relative;width:100%;height:320px}
.section-title{font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:10px;margin-top:1.5rem}
.ctrl-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.ctrl-row label{font-size:12px;color:var(--color-text-secondary)}
.ctrl-row select{font-size:12px;padding:4px 8px}
.note{font-size:12px;color:var(--color-text-secondary);margin-top:6px;line-height:1.5}
.panel{display:none}.panel.active{display:block}
</style>

<div class="wrap">
<h2 class="sr-only">오늘 할 일 챕터별 이용 현황 분석 대시보드</h2>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('overview')">전체 추이</button>
  <button class="tab-btn" onclick="switchTab('recent')">최근 추이 (2026.01~)</button>
  <button class="tab-btn" onclick="switchTab('detail')">챕터별 상세</button>
</div>

<div id="panel-overview" class="panel active">
  <div style="margin-bottom:10px">
    <div class="ctrl-row">
      <label>지표 선택</label>
      <select id="ov-metric" onchange="renderOverview()">
        <option value="au_rate">AU율 (AU/DAU %)</option>
        <option value="au">이용 AU</option>
        <option value="avg">평균 횟수</option>
        <option value="tot">총 이용횟수</option>
      </select>
    </div>
  </div>
  <div id="ov-legend" class="legend"></div>
  <div class="chart-wrap-lg"><canvas id="ov-chart" role="img" aria-label="챕터별 전체 주간 추이 차트"></canvas></div>
  <p class="note">* 주간 평균 기준 | 데이터 기간: 2024.06 ~ 2026.05</p>
</div>

<div id="panel-recent" class="panel">
  <p class="section-title">2026.01 이후 챕터별 현황 요약</p>
  <div class="metric-grid" id="recent-summary"></div>
  <div class="ctrl-row" style="margin-top:1rem">
    <label>지표 선택</label>
    <select id="rc-metric" onchange="renderRecent()">
      <option value="au_rate">AU율 (AU/DAU %)</option>
      <option value="au">이용 AU</option>
      <option value="avg">평균 횟수</option>
      <option value="tot">총 이용횟수</option>
    </select>
  </div>
  <div id="rc-legend" class="legend"></div>
  <div class="chart-wrap-lg"><canvas id="rc-chart" role="img" aria-label="2026년 1월 이후 챕터별 일별 추이"></canvas></div>
  <p class="note">* 일별 기준 | 2026.01.01 ~ 2026.05.17</p>
</div>

<div id="panel-detail" class="panel">
  <div class="ctrl-row">
    <label>챕터 선택</label>
    <select id="dt-chapter" onchange="renderDetail()">
      <option value="1">챕터 1</option>
      <option value="2">챕터 2</option>
      <option value="3">챕터 3</option>
      <option value="4">챕터 4</option>
      <option value="5">챕터 5</option>
      <option value="6">챕터 6</option>

  <div class="chart-wrap"><canvas id="dt-avg-chart" role="img" aria-label="챕터 평균횟수 추이"></canvas></div>
</div>
</div>

const CH_COLORS=['#378ADD','#1D9E75','#D85A30','#D4537E','#7F77DD','#BA7517'];

let charts={};
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}

const METRIC_LABELS={au_rate:'AU율 (%)',au:'이용 AU',avg:'평균 횟수',tot:'총 이용횟수'};
const METRIC_FORMAT={au_rate:v=>v!=null?v.toFixed(2)+'%':null, au:v=>v!=null?Math.round(v).toLocaleString():null, avg:v=>v!=null?v.toFixed(2)+'회':null, tot:v=>v!=null?Math.round(v).toLocaleString():null};

function getField(row,metric,ch){return row[metric+'_'+ch];}

function buildLegend(el,activeChapters){
  el.innerHTML=activeChapters.map((ch,i)=>`<span><span class="lbox" style="background:${CH_COLORS[ch-1]}"></span>챕터${ch}</span>`).join('');
}

  destroyChart('ov');
  const metric=document.getElementById('ov-metric').value;
  const activeChapters=[1,2,3,4,5,6];
  buildLegend(document.getElementById('ov-legend'),activeChapters);
  const labels=WEEKLY.map(r=>r.date);
  const datasets=activeChapters.map((ch,i)=>({
    label:'챕터'+ch,
    data:WEEKLY.map(r=>getField(r,metric,ch)),
    borderColor:CH_COLORS[i],
    backgroundColor:CH_COLORS[i]+'22',
    borderWidth:1.5,
    pointRadius:0,
    spanGaps:true,
    tension:0.3,
    borderDash:i===1?[5,2]:i===2?[5,2]:i===3?[3,2]:i===4?[8,2,2,2]:[]
  }));
  const ctx=document.getElementById('ov-chart').getContext('2d');
  charts['ov']=new Chart(ctx,{type:'line',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{label:i=>`챕터${activeChapters[i.datasetIndex]}: ${METRIC_FORMAT[metric](i.raw)}`}}},scales:{x:{ticks:{maxTicksLimit:12,maxRotation:0,font:{size:11}},grid:{display:false}},y:{ticks:{font:{size:11},callback:v=>METRIC_FORMAT[metric](v)},grid:{color:'rgba(128,128,128,0.1)'}}}}});

  el.innerHTML=[1,2,3,4,5,6].map(ch=>{

    const tClass=trend>=0?'up':'dn';
    const tSign=trend>=0?'▲':'▼';
    return `<div class="metric-card">
      <div class="mc-ch" style="color:${CH_COLORS[ch-1]}">챕터 ${ch}</div>
      <div class="mc-label">평균 AU율</div>

  const elLTop=document.getElementById('dt-legend-top');
  const elLBot=document.getElementById('dt-legend-bot');
  [elLTop,elLBot].forEach(el=>{
    el.innerHTML=`<span><span class="lbox" style="background:${color}88"></span>전체 기간</span><span><span class="lbox" style="background:${color}"></span>2026.01 이후</span>`;
  });

  makeChart('dt-au-chart','au_rate','AU율',v=>v!=null?v.toFixed(2)+'%':null);
  makeChart('dt-avg-chart','avg','평균 횟수',v=>v!=null?v.toFixed(2)+'회':null);
}

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['overview','recent','detail'][i]===tab);
  });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  if(tab==='overview') renderOverview();
  else if(tab==='recent'){buildRecentSummary();renderRecent();}
  else if(tab==='detail') renderDetail();
}

renderOverview();
</script>
